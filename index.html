<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>NST Consultation – Formulaire Concours</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="form-shell">
    <div class="form-header">
      <div class="logo-wrapper">
      </div>



      <div class="form-title-group">
        <h1>Participation<br />Concours NST</h1>
        <p>Kiosque Arcade • Robopack &amp; Intune</p>
      </div>


      <div class="header-right">
        <!-- <div class="badge-nst">NST Consultation • High-Tech</div> -->
        <img src="logo-nst.png" alt="NST Consultation" class="logo-nst" />
        <img src="logo-robopack.png" alt="RoboPack" class="logo-robopack" />
      </div>


    </div>


    <form id="nst-form">
      <div class="form-field">
        <label for="fullName">Nom complet</label>
        <div class="input-shell">
          <input type="text" id="fullName" name="NomComplet" autocomplete="name" placeholder="Prénom Nom" required />
        </div>
      </div>

      <div class="field-row-2">
        <div class="form-field">
          <label for="email">Courriel</label>
          <div class="input-shell">
            <input type="email" id="email" name="Courriel" autocomplete="email" placeholder="prenom.nom@domaine.ca" required />
          </div>
        </div>

        <div class="form-field">
          <label for="etablissement">Établissement</label>
          <div class="input-shell autocomplete-shell" id="etablissement-wrapper">
            <input
              type="text"
              id="etablissement"
              name="Etablissement"
              placeholder="Tapez pour chercher votre établissement…"
              autocomplete="off"
              required
            />
            <ul id="etablissement-autocomplete" class="autocomplete-list"></ul>
          </div>
        </div>
      </div>

      <div class="field-row-2">
        <div class="form-field">
          <label>Déjà client NST ?</label>
          <div class="radio-group">
            <div class="toggle-pill" data-toggle="client-nst" data-value="oui">
              <label class="toggle-option is-active" data-value="oui">
                <input type="radio" name="DejaClientNST" value="Oui" checked />
                Oui
              </label>
              <label class="toggle-option" data-value="non">
                <input type="radio" name="DejaClientNST" value="Non" />
                Non
              </label>
            </div>
          </div>
        </div>

        <div class="form-field">
          <label>Déjà client RoboPack ?</label>
          <div class="radio-group">
            <div class="toggle-pill" data-toggle="client-robo" data-value="non">
              <label class="toggle-option" data-value="oui">
                <input type="radio" name="DejaClientRoboPack" value="Oui" />
                Oui
              </label>
              <label class="toggle-option is-active" data-value="non">
                <input type="radio" name="DejaClientRoboPack" value="Non" checked />
                Non
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="form-field">
        <label for="score">Score obtenu</label>
        <div class="input-shell">
          <input type="number" id="score" name="ScoreObtenu" min="0" step="1" placeholder="Ex. 975450" required />
        </div>
        <p class="help-text">Saisir le score affiché sur la borne (sans espace).</p>
      </div>

      <div class="form-field">
        <label>Preuve visuelle (Photo du score)</label>
        <input type="file" id="scorePhoto" accept="image/*" capture="environment" hidden />
        <button type="button" class="photo-btn" id="photoButton">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          Prendre mon score en photo
        </button>
        <div class="photo-preview-container" id="photoPreviewContainer" style="display: none;">
          <img id="photoPreview" src="" alt="Aperçu du score" />
          <button type="button" class="photo-remove-btn" id="photoRemoveBtn">&times;</button>
        </div>
      </div>

      <input type="hidden" name="SourceFormulaire" value="Kiosque Arcade" />

      <div class="form-footer">
        <button type="submit" class="submit-btn">Envoyer la participation</button>
        <div class="status-message" id="statusMessage"></div>
      </div>
    </form>
  </div>

  <!-- Animation de succès -->
  <div id="successToast" class="success-toast">
    <div class="success-icon">
      <span class="checkmark-stem"></span>
      <span class="checkmark-kick"></span>
    </div>
    <div class="success-text">Score enregistré !</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
