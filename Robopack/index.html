<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>NST CONSULTATION — ESSAIS ET SERVICES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="form-shell">
    <div class="form-header" style="text-align: center; justify-content: center; align-items: center;">
      <div class="form-title-group" style="text-align: center; width: 100%;">
        <h1>Nous rejoindre</h1>
        <p style="color: var(--accent); font-weight: 600; font-size: 0.85rem; margin-top: 8px;">NSTconsultation –
          Partenaire expert en intégration</p>
      </div>

      <div class="logo-wrapper" style="justify-content: center; margin-top: 8px; flex-wrap: wrap;">
        <img src="../NST_CMYK_2025.png" alt="NSTconsultation" class="logo-nst" style="margin-right: 20px;" />
        <img src="../logo-robopack.png" alt="Robopack" class="logo-robopack" />
        <span class="logo-plus">+</span>
        <img src="../TenantManagerBlanc.svg" alt="Tenant Manager" class="logo-tenant" />
      </div>
    </div>

    <form id="robopack-form">
      <div class="form-field">
        <label for="fullName">Nom complet</label>
        <div class="input-shell">
          <input type="text" id="fullName" name="NomComplet" autocomplete="name" placeholder="Prénom Nom" required />
        </div>
      </div>

      <div class="field-row-2">
        <div class="form-field">
          <label for="email">Courriel</label>
          <div class="input-shell">
            <input type="email" id="email" name="Courriel" autocomplete="email" placeholder="prenom.nom@domaine.ca"
              required />
          </div>
        </div>

        <div class="form-field">
          <label for="etablissement">Établissement</label>
          <div class="input-shell autocomplete-shell" id="etablissement-wrapper">
            <input type="text" id="etablissement" name="Etablissement"
              placeholder="Tapez pour chercher votre établissement…" autocomplete="off" required />
            <ul id="etablissement-autocomplete" class="autocomplete-list"></ul>
          </div>
        </div>
      </div>

      <div class="form-field">
        <label for="nombreAppareils">Nombre d'appareils dans votre établissement</label>
        <div class="input-shell custom-select-shell">
          <select id="nombreAppareils" name="NombreAppareils" required>
            <option value="" disabled selected>Sélectionnez une plage...</option>
            <option value="<101">&lt;101</option>
            <option value="101-255">101 - 255</option>
            <option value="256-1499">256 - 1 499</option>
            <option value="1500-2999">1 500 - 2 999</option>
            <option value="3000-4999">3 000 - 4 999</option>
            <option value="5000-9999">5 000 - 9 999</option>
            <option value="10000-24999">10 000 - 24 999</option>
            <option value="25000-49999">25 000 - 49 999</option>
            <option value="50000-99999">50 000 - 99 999</option>
            <option value="+100000">100 000 +</option>
          </select>
          <div class="select-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
        </div>
      </div>

      <div class="form-field">
        <label>Services souhaités</label>
        <div class="checkbox-wrapper" style="display: flex; flex-direction: row; flex-wrap: wrap; gap: 20px;">
          <label class="checkbox-label">
            <input type="checkbox" id="chk-nst" name="serviceNST" />
            <span class="checkbox-custom"></span>
            Offre de service NSTconsultation
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="chk-robopack" name="serviceRobopack" />
            <span class="checkbox-custom"></span>
            Version d'essai Robopack
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="chk-tenant" name="serviceTenantManager" />
            <span class="checkbox-custom"></span>
            Version d'essai Tenant Manager
          </label>
        </div>
      </div>

      <div class="form-field">
        <label>Consentement</label>
        <div class="checkbox-wrapper">
          <label class="checkbox-label">
            <input type="checkbox" id="consentement" name="Consentement" />
            <span class="checkbox-custom"></span>
            J'accepte d'être contacté(e) concernant cette demande de version d'essai et les services associés (Loi 25).
          </label>
        </div>
      </div>

      <input type="hidden" name="SourceFormulaire" value="Demande Version d'essai Robopack" />

      <div class="form-footer">
        <button type="submit" class="submit-btn">Déverrouiller mon offre partenaire</button>
        <div class="status-message" id="statusMessage"></div>
      </div>
    </form>
  </div>

  <!-- Animation de succès -->
  <div id="successToast" class="success-toast">
    <div class="success-icon">
      <span class="checkmark-stem"></span>
      <span class="checkmark-kick"></span>
    </div>
    <div class="success-text">Demande envoyée !<br><span
        style="font-size:0.75rem; color:rgba(255,255,255,0.7); font-weight:normal;">Un courriel vous a été
        envoyé.</span></div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('robopack-form').addEventListener('submit', async function (e) {
      e.preventDefault(); // Empêche le rechargement de la page

      // 1. Récupération des données du formulaire avec les ID ajustés
      const payload = {
        nomComplet: document.getElementById('fullName').value,
        courriel: document.getElementById('email').value,
        etablissement: document.getElementById('etablissement').value,
        nombreAppareils: document.getElementById('nombreAppareils').value,
        serviceNST: document.getElementById('chk-nst').checked,
        serviceRobopack: document.getElementById('chk-robopack').checked,
        serviceTenantManager: document.getElementById('chk-tenant').checked,
        consentement: document.getElementById('consentement').checked
      };

      const submitBtn = this.querySelector('.submit-btn');
      const statusEl = document.getElementById('statusMessage');
      const successToast = document.getElementById('successToast');

      function setStatus(message, type) {
        statusEl.textContent = message || "";
        statusEl.className = "status-message" + (type ? " " + type : "");
      }

      // Validation : Au moins 1 service doit être coché
      if (!payload.serviceNST && !payload.serviceRobopack && !payload.serviceTenantManager) {
        setStatus("Veuillez sélectionner au moins un service souhaité.", "error");
        return;
      }

      // Validation : Consentement obligatoire
      if (!payload.consentement) {
        setStatus("Veuillez cocher la case de consentement pour poursuivre.", "error");
        return;
      }

      // 2. URL secrète Power Automate intégrée d'origine
      const powerAutomateUrl = "https://default3d2e2497f4f140a482ea11a31347e3.79.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/53a4d105c78840a0953692bc19ec1c17/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=qRGcAW6AthhkonG7yvETtK1EtXKTfwpp6fNqHCPeUB4";

      setStatus("Envoi en cours…", "");
      submitBtn.disabled = true;

      try {
        // 3. Envoi de la requête HTTP POST
        const response = await fetch(powerAutomateUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          setStatus("Merci ! Votre demande a été envoyée. Un courriel de confirmation suivra.", "success");
          if (successToast) {
            successToast.classList.add("is-visible");
            window.setTimeout(() => {
              successToast.classList.remove("is-visible");
            }, 2600);
          }
          this.reset(); // Vide le formulaire
        } else {
          setStatus("Oups, une erreur est survenue lors de l'envoi. Veuillez réessayer.", "error");
        }
      } catch (error) {
        console.error('Erreur réseau :', error);
        setStatus("Impossible de joindre le serveur. Vérifiez votre connexion.", "error");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>

</html>
